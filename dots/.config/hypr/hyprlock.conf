# ============================================================
# Hyprlock Configuration - Consolidated
# ============================================================

# Colors (generated by matugen - may be overwritten)
$text_color = rgba(d9e2ffFF)
$entry_background_color = rgba(00194411)
$entry_border_color = rgba(8f909955)
$entry_color = rgba(d9e2ffFF)
$font_family = Google Sans Flex Medium
$font_family_clock = Google Sans Flex Medium
$font_material_symbols = Material Symbols Rounded

# Time variable
$TIME = cmd[update:1000] echo "$(date +"%H:%M")"
$LAYOUT = cmd[update:1000] hyprctl devices -j | jq -r '.keyboards[] | select(.main == true) | .active_keymap' | head -n 1

# ============================================================
# Background
# ============================================================
# Legacy: /home/secret-star/Pictures/wallpaper2.jpg with blur_passes = 2
background {
    path = /home/secret-star/Pictures/wallpaper2.jpg
    blur_passes = 2
}

# ============================================================
# Input field
# ============================================================
input-field {
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.1
    dots_spacing = 0.3
    outer_color = $entry_border_color
    inner_color = $entry_background_color
    font_color = $entry_color
    fade_on_empty = true
    placeholder_text = <i>Use Fingerprint or Password...</i>
    position = 0, 20
    halign = center
    valign = center
}

# ============================================================
# Labels
# ============================================================
label { # Layout
    monitor =
    text = $LAYOUT
    color = $text_color
    font_size = 14
    font_family = $font_family
    position = -30, 30
    halign = right
    valign = bottom
}

label { # Caps Lock Warning
    monitor =
    text = cmd[update:250] ${XDG_CONFIG_HOME:-$HOME/.config}/hypr/hyprlock/check-capslock.sh
    color = $text_color
    font_size = 13
    font_family = $font_family
    position = 0, -25
    halign = center
    valign = center
}

label { # Clock
    monitor =
    text = $TIME
    color = $text_color
    font_size = 65
    font_family = $font_family_clock
    position = 0, 300
    halign = center
    valign = center
}

label { # Date
    monitor =
    text = cmd[update:5000] date +"%A, %B %d"
    color = $text_color
    font_size = 17
    font_family = $font_family_clock
    position = 0, 240
    halign = center
    valign = center
}

label { # User
    monitor =
    text =     $USER
    color = $text_color
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    font_size = 20
    font_family = $font_family
    position = 0, 50
    halign = center
    valign = bottom
}

label { # Status
    monitor =
    text = cmd[update:5000] ${XDG_CONFIG_HOME:-$HOME/.config}/hypr/hyprlock/status.sh
    color = $text_color
    font_size = 14
    font_family = $font_family
    position = 30, -30
    halign = left
    valign = top
}
