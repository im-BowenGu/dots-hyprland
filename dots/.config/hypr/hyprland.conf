# ============================================================
# Hyprland Configuration - Consolidated
# ============================================================

# ============================================================
# Environment variables
# ============================================================
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = XDG_DATA_DIRS,$HOME/.local/share/flatpak/exports/share:/var/lib/flatpak/exports/share:/usr/local/share:/usr/share
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,kde
env = XDG_MENU_PREFIX,plasma-
env = XMODIFIERS,@im=fcitx
env = QT_IM_MODULE,fcitx
env = GTK_IM_MODULE,fcitx
env = MOZ_ENABLE_WAYLAND,1
env = ILLOGICAL_IMPULSE_VIRTUAL_ENV,~/.local/state/quickshell/.venv

# Extra environment variables (uncomment as needed):
# Tearing:
# env = WLR_DRM_NO_ATOMIC, 1
# env = WLR_NO_HARDWARE_CURSORS, 1

# Default editor:
# env = EDITOR, vim

# ============================================================
# Variables
# ============================================================

$mainMod = SUPER

# Apps (auto-detects first available)
$terminal = ~/.config/hypr/scripts/launch_first_available.sh "kitty -1" "foot" "alacritty" "wezterm" "konsole" "kgx" "uxterm" "xterm"
$fileManager = ~/.config/hypr/scripts/launch_first_available.sh "dolphin" "nautilus" "nemo" "thunar" "kitty -1 fish -c yazi"
$browser = ~/.config/hypr/scripts/launch_first_available.sh "google-chrome-stable" "zen-browser" "firefox" "brave" "chromium" "microsoft-edge-stable" "opera" "librewolf"
$codeEditor = ~/.config/hypr/scripts/launch_first_available.sh "antigravity" "code" "codium" "cursor" "zed" "zedit" "zeditor" "kate" "gnome-text-editor" "emacs" "command -v nvim && kitty -1 nvim" "command -v micro && kitty -1 micro"
$officeSoftware = ~/.config/hypr/scripts/launch_first_available.sh "wps" "onlyoffice-desktopeditors" "libreoffice"
$textEditor = ~/.config/hypr/scripts/launch_first_available.sh "kate" "gnome-text-editor" "emacs"
$volumeMixer = ~/.config/hypr/scripts/launch_first_available.sh "pavucontrol-qt" "pavucontrol"
$settingsApp = XDG_CURRENT_DESKTOP=gnome ~/.config/hypr/scripts/launch_first_available.sh "qs -p ~/.config/quickshell/$qsConfig/settings.qml" "systemsettings" "gnome-control-center" "better-control"
$taskManager = ~/.config/hypr/scripts/launch_first_available.sh "gnome-system-monitor" "plasma-systemmonitor --page-name Processes" "command -v btop && kitty -1 fish -c btop"

$qsConfig = ii

# ============================================================
# Monitor config
# ============================================================
monitor=,preferred,auto,1

# From legacy: 3200x2000@165, auto, 1.33
# monitor=,3200x2000@165,auto,1.33

# Custom reserved area:
# monitor=,addreserved, 0, 0, 0, 0

# HDMI mirror (check device name with `hyprctl monitors`):

# ============================================================
# Device-specific input
# ============================================================
device {
    name = gxtp5100:00-27c6:01eb-touchpad
    sensitivity = 0.1
    enabled = true
}

device {
    name = gxtp5100:00-27c6:01eb-mouse
    sensitivity = 0.1
    enabled = true
}

# ============================================================
# Gestures
# ============================================================
gesture = 3, swipe, move,
gesture = 3, pinch, float
gesture = 4, horizontal, workspace
gesture = 4, up, dispatcher, global, quickshell:overviewWorkspacesToggle
gesture = 4, down, dispatcher, global, quickshell:overviewWorkspacesClose

gestures {
    workspace_swipe_distance = 700
    workspace_swipe_cancel_ratio = 0.2
    workspace_swipe_min_speed_to_force = 5
    workspace_swipe_direction_lock = true
    workspace_swipe_direction_lock_threshold = 10
    workspace_swipe_create_new = true
}

# ============================================================
# General
# ============================================================
general {
    layout = dwindle
    gaps_in = 4
    gaps_out = 5
    gaps_workspaces = 50
    border_size = 1
    col.active_border = rgba(F7DCDE39)
    col.inactive_border = rgba(A58A8D30)
    resize_on_border = true
    no_focus_fallback = true
    allow_tearing = true

    snap {
        enabled = true
        window_gap = 4
        monitor_gap = 5
        respect_gaps = true
    }
}

# ============================================================
# Dwindle layout
# ============================================================
dwindle {
    preserve_split = true
    smart_split = false
    smart_resizing = false
    # precise_mouse_move = true
}

# ============================================================
# Decoration
# ============================================================
decoration {
    rounding_power = 2
    rounding = 18
    active_opacity = 1.0
    inactive_opacity = 0.9

    blur {
        enabled = true
        xray = true
        special = false
        new_optimizations = true
        size = 10
        passes = 3
        brightness = 1
        noise = 0.05
        contrast = 0.89
        vibrancy = 0.5
        vibrancy_darkness = 0.5
        popups = false
        popups_ignorealpha = 0.6
        input_methods = true
        input_methods_ignorealpha = 0.8
    }

    shadow {
        enabled = true
        ignore_window = true
        range = 32
        offset = 0 2
        render_power = 10
        color = rgba(d56ab1ee)
    }

    dim_inactive = true
    dim_strength = 0.05
    dim_special = 0.2
}

# ============================================================
# Animations
# ============================================================
animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.1
    bezier = expressiveFastSpatial, 0.42, 1.67, 0.21, 0.90
    bezier = expressiveSlowSpatial, 0.39, 1.29, 0.35, 0.98
    bezier = expressiveDefaultSpatial, 0.38, 1.21, 0.22, 1.00
    bezier = emphasizedDecel, 0.05, 0.7, 0.1, 1
    bezier = emphasizedAccel, 0.3, 0, 0.8, 0.15
    bezier = standardDecel, 0, 0, 0, 1
    bezier = menu_decel, 0.1, 1, 0, 1
    bezier = menu_accel, 0.52, 0.03, 0.72, 0.08
    bezier = stall, 1, -0.1, 0.7, 0.85

    animation = windows, 1, 7, myBezier
    animation = windowsIn, 1, 3, emphasizedDecel, popin 80%
    animation = fadeIn, 1, 3, emphasizedDecel
    animation = windowsOut, 1, 7, default, popin 80%
    animation = fadeOut, 1, 2, emphasizedDecel
    animation = windowsMove, 1, 3, emphasizedDecel, slide
    animation = border, 1, 10, default
    animation = layersIn, 1, 2.7, emphasizedDecel, popin 93%
    animation = layersOut, 1, 2.4, menu_accel, popin 94%
    animation = fadeLayersIn, 1, 0.5, menu_decel
    animation = fadeLayersOut, 1, 2.7, stall
    animation = workspaces, 1, 6, default
    animation = specialWorkspaceIn, 1, 2.8, emphasizedDecel, slidevert
    animation = specialWorkspaceOut, 1, 1.2, emphasizedAccel, slidevert
    animation = zoomFactor, 1, 3, standardDecel
}

# ============================================================
# Input
# ============================================================
input {
    kb_layout = us
    numlock_by_default = true
    repeat_delay = 250
    repeat_rate = 35
    follow_mouse = 1
    off_window_axis_events = 2
    sensitivity = 0

    touchpad {
        natural_scroll = true
        disable_while_typing = true
        clickfinger_behavior = true
        tap-to-click = true
        scroll_factor = 0.7
    }
}

# ============================================================
# Misc
# ============================================================
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vfr = 1
    vrr = 0
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    animate_manual_resizes = false
    animate_mouse_windowdragging = false
    enable_swallow = false
    swallow_regex = (foot|kitty|allacritty|Alacritty)
    on_focus_under_fullscreen = 2
    allow_session_lock_restore = true
    session_lock_xray = true
    initial_workspace_tracking = false
    focus_on_activate = true
    background_color = rgba(1D1011FF)
}

# ============================================================
# Binds
# ============================================================
binds {
    scroll_event_delay = 0
    hide_special_on_workspace_change = true
}

# ============================================================
# Cursor
# ============================================================
cursor {
    zoom_factor = 1
    zoom_rigid = false
    zoom_disable_aa = true
    hotspot_padding = 1
}

# ============================================================
# XWayland
# ============================================================
xwayland {
    force_zero_scaling = true
}

# ============================================================
# Hyprbars plugin
# ============================================================
plugin {
    hyprbars {
        bar_text_font = Google Sans Flex Medium, Rubik, Geist, AR One Sans, Reddit Sans, Inter, Roboto, Ubuntu, Noto Sans, sans-serif
        bar_height = 30
        bar_padding = 10
        bar_button_padding = 5
        bar_precedence_over_border = true
        bar_part_of_window = true
        bar_color = rgba(1D1011FF)
        col.text = rgba(F7DCDEFF)

        hyprbars-button = rgb(F7DCDE), 13, 󰖭, hyprctl dispatch killactive
        hyprbars-button = rgb(F7DCDE), 13, 󰖯, hyprctl dispatch fullscreen 1
        hyprbars-button = rgb(F7DCDE), 13, 󰖰, hyprctl dispatch movetoworkspacesilent special
    }
}

# ============================================================
# Exec-once (autostart)
# ============================================================
exec-once = hyprpolkitagent
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = fcitx5 -d
exec-once = hypridle
exec-once = swaync
exec-once = wl-paste --watch cliphist store
exec-once = swww-daemon -f xrgb
exec-once = ~/.config/waybar/launch.sh
exec-once = hyprctl setcursor Nordzy-cursors 24

# Quickshell / illogical-impulse exec-once:
exec-once = ~/.config/hypr/scripts/start_geoclue_agent.sh
exec-once = qs -c $qsConfig &
exec-once = ~/.config/hypr/scripts/__restore_video_wallpaper.sh
exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = dbus-update-activation-environment --all
exec-once = sleep 1 && dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = easyeffects --hide-window --service-mode
exec-once = wl-paste --type text --watch bash -c 'cliphist store && qs -c $qsConfig ipc call cliphistService update'
exec-once = wl-paste --type image --watch bash -c 'cliphist store && qs -c $qsConfig ipc call cliphistService update'
exec-once = hyprctl setcursor Bibata-Modern-Classic 24

# Custom autostart (uncomment as needed):
# Fix dock pinned apps:
# exec-once = sleep 3.5 && hyprctl reload && sleep 0.5 && touch ~/.config/quickshell/ii/shell.qml

# ============================================================
# Keybinds
# ============================================================

# DO NOT REMOVE THIS EXEC OR YOU WON'T BE ABLE TO USE ANY KEYBIND
exec = hyprctl dispatch submap global
submap = global

